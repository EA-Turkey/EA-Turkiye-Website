devrim:
  name: Ceren Devrim Karabulut
  initials: C
  photo: team/ceren-devrim-karabulut.jpg
  role:
    tr: Eş Direktör
    en: Co-Director
  bio:
    tr: Orta Doğu Teknik Üniversitesi Sosyoloji bölümü mezunu olan Ceren Devrim Karabulut, Efektif Altruizm Türkiye'nin eş direktörü olarak Türkiye'deki efektif altruizm hareketinin gelişimine katkı sağlamaktadır. Uzmanlık alanları müşteri deneyimi tasarımı ve topluluk organizasyonudur. Ceren aynı zamanda yüksek etkili sağlık politikası derneklerine işe alım desteği sağlayan ve erken ile orta kariyer profesyoneller için eğitim programları düzenleyen Health Progress Hub isimli bir sivil toplum kuruluşunda topluluk ve iletişim sorumlusu olarak görev yapmaktadır. Daha öncesinde, Birleşmiş Milletler Kalkınma Programı'ndaki görevi kapsamında iletişim ekibinin bir parçası olarak Sürdürülebilir Kalkınma Amaçları'nın sosyal medya hesaplarını yönetmiştir.
    en: Ceren Devrim Karabulut, a graduate of the Sociology Department at Middle East Technical University, contributes to the development of the effective altruism movement in Turkey as the co-director of Effective Altruism Turkey. Her areas of expertise are customer experience design and community organizing. Ceren also serves as the community and communications manager at a non-governmental organization called Health Progress Hub, which provides recruitment support to high-impact health policy associations and organizes training programs for early- to mid-career professionals. Previously, as part of the communications team during her tenure at the United Nations Development Programme, she managed the social media accounts for the Sustainable Development Goals.
  email: ""
  linkedin: ""

firat:
  name: Fırat Akova
  initials: F
  photo: team/firat-akova.jpg
  role:
    tr: Eş Direktör
    en: Co-Director
  bio:
    tr: Dr. Fırat Akova, Power for Democracies bünyesinde kıdemli araştırmacıdır. Koç Üniversitesi Felsefe Bölümü'nde öğretim görevlisi olarak çalışmıştır. Oxford Üniversitesi'ne bağlı Global Priorities Institute tarafından açılan bir araştırma programında yer almış ve Oxford Üniversitesi'yle yakından çalışan Forethought Foundation for Global Priorities Research tarafından Global Priorities Fellow olarak seçilmiştir. Doktorasını, araştırma görevlisi olarak da çalıştığı Warwick Üniversitesi Felsefe Bölümü'nde efektif altruizm üstüne tamamlamıştır. Efektif Altruizm Türkiye'nin kurucusudur.
    en: Dr. Fırat Akova is a Senior Research Fellow at Power for Democracies. He worked as a Lecturer in the Department of Philosophy at Koç University. He participated in a research programme organized by the Global Priorities Institute at the University of Oxford and was selected as a Global Priorities Fellow by the Forethought Foundation for Global Priorities Research, which collaborates closely with the University of Oxford. He completed his PhD on effective altruism in the Department of Philosophy at the University of Warwick, where he also worked as a Senior Graduate Teaching Assistant. He is the founder of Effective Altruism Türkiye.
  email: firat.akova@eaturkiye.org
  linkedin: ""
