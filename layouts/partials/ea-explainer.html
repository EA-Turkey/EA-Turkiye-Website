{{ $intro := .intro }}
{{ $pillars := .pillars }}

<section class="section" id="ea-nedir">
  <div class="container ea-explainer">
    <div class="stack-md" data-reveal>
      <span class="section-header__eyebrow">{{ .label }}</span>
      <h2><em>"{{ .title }}"</em></h2>
      {{ with .subtitle }}<h3 style="font-size: var(--text-lg); font-weight: 600; color: var(--color-ink-950); margin-top: var(--space-8);">{{ . }}</h3>{{ end }}
      {{ range $intro }}
        <p class="text-muted">{{ . }}</p>
      {{ end }}
    </div>

    <div class="stack-sm" data-reveal>
      {{ with .pillars_label }}<p class="section-header__eyebrow" style="margin-bottom: var(--space-8);">{{ . }}</p>{{ end }}
      <div class="pillar-list">
      {{ range $pillars }}
        <article class="pillar-card stack-sm">
          <h3>{{ .title }}</h3>
          <p class="text-muted">{{ .text }}</p>
        </article>
      {{ end }}
      </div>
    </div>
  </div>
</section>
