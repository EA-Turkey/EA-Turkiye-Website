{{ $intro := .intro }}
{{ $pillars := .pillars }}

<section class="section" id="ea-nedir">
  <div class="container ea-explainer">
    <div class="stack-md" data-reveal>
      <span class="section-header__eyebrow">{{ .label }}</span>
      <h2><em>"{{ .title }}"</em></h2>
      {{ range $intro }}
        <p class="text-muted">{{ . }}</p>
      {{ end }}
    </div>

    {{ with .pillars_label }}<p class="section-header__eyebrow" style="margin-bottom: var(--space-16);">{{ . }}</p>{{ end }}
    <div class="pillar-list" data-reveal>
      {{ range $pillars }}
        <article class="pillar-card stack-sm">
          <h3>{{ .title }}</h3>
          <p class="text-muted">{{ .text }}</p>
        </article>
      {{ end }}
    </div>
  </div>
</section>
