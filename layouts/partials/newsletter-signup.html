{{ partial "helpers/lang-context.html" . }}
{{ $langSite := .Scratch.Get "langSite" }}
{{ with $langSite.Params.social.substack }}
  <section class="section section--surface newsletter-section">
    <div class="container">
      <div class="stack-md" data-reveal>
        <div class="stack-sm">
          <h2>{{ i18n "newsletter_title" }}</h2>
          <p class="text-muted">{{ i18n "newsletter_text" }}</p>
        </div>
        <div class="newsletter-embed">
          <iframe src="{{ printf "%sembed" . }}" title="{{ i18n "newsletter_title" }}" loading="lazy"></iframe>
        </div>
        <p class="newsletter-fallback text-muted">
          <a href="{{ . }}" target="_blank" rel="noreferrer">{{ i18n "view_on_substack" }}</a>
        </p>
      </div>
    </div>
  </section>
{{ end }}
