<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{{ partial "seo-meta.html" . }}

<link rel="preload" href="{{ "fonts/inter-400-latin-ext.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ "fonts/inter-600-latin-ext.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ "fonts/playfair-700-latin-ext.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>

{{ $css := slice
  (resources.Get "css/tokens.css")
  (resources.Get "css/fonts.css")
  (resources.Get "css/base.css")
  (resources.Get "css/layout.css")
  (resources.Get "css/components.css")
  (resources.Get "css/utilities.css")
  | resources.Concat "css/main.css" | minify
}}
<link rel="stylesheet" href="{{ $css.RelPermalink }}?v={{ md5 $css.Content }}">

<link rel="icon" href="{{ "favicon.ico" | relURL }}">
<link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
<link rel="manifest" href="{{ "site.webmanifest" | relURL }}">
