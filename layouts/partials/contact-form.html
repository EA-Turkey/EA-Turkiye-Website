{{ partial "helpers/lang-context.html" . }}
{{ $lang := .Scratch.Get "actualLang" }}
<form id="contact-form" class="contact-form" action="/api/contact" method="post" novalidate>
  <div class="form-grid form-grid--2">
    <div class="form-field">
      <label for="first_name">{{ i18n "form_first_name" }}</label>
      <input id="first_name" name="first_name" type="text" required>
    </div>
    <div class="form-field">
      <label for="last_name">{{ i18n "form_last_name" }}</label>
      <input id="last_name" name="last_name" type="text">
    </div>
  </div>

  <div class="form-field">
    <label for="email">{{ i18n "form_email" }}</label>
    <input id="email" name="email" type="email" required>
  </div>

  <div class="form-grid form-grid--2">
    <div class="form-field">
      <label for="city">{{ i18n "form_city" }}</label>
      <select id="city" name="city">
        {{ range .Params.form.cities }}
          <option value="{{ . }}">{{ . }}</option>
        {{ end }}
      </select>
    </div>

    <div class="form-field">
      <label for="interest">{{ i18n "form_interest" }}</label>
      <select id="interest" name="interest" required>
        {{ range .Params.form.interests }}
          <option value="{{ . }}">{{ . }}</option>
        {{ end }}
      </select>
    </div>
  </div>

  <div class="form-field">
    <label for="message">{{ i18n "form_message" }}</label>
    <textarea id="message" name="message" rows="6"></textarea>
  </div>

  <input type="hidden" name="language" value="{{ $lang }}">

  <div class="form-honeypot" aria-hidden="true">
    <label for="company">Company</label>
    <input id="company" name="company" type="text" tabindex="-1" autocomplete="off">
  </div>

  <button class="button button--primary" type="submit">{{ i18n "form_submit" }}</button>
  <p id="form-status" class="form-status" aria-live="polite"></p>
  <p class="form-fallback">
    {{ i18n "form_fallback_prefix" }}
    <a href="mailto:{{ .Site.Params.contact.primary_email }}">{{ .Site.Params.contact.primary_email }}</a>
  </p>
</form>
