{{ partial "helpers/lang-context.html" . }}
{{ $lang := .Scratch.Get "actualLang" }}
{{ $langSite := .Scratch.Get "langSite" }}
<form
  id="contact-form"
  class="contact-form"
  action="/api/contact"
  method="post"
  data-sending-message="{{ i18n "form_status_sending" }}"
  data-error-message="{{ i18n "form_status_error_generic" }}"
  novalidate
>
  <div class="form-grid form-grid--2">
    <div class="form-field">
      <label for="first_name">{{ i18n "form_first_name" }}</label>
      <input id="first_name" name="first_name" type="text" autocomplete="given-name" required>
    </div>
    <div class="form-field">
      <label for="last_name">{{ i18n "form_last_name" }}</label>
      <input id="last_name" name="last_name" type="text" autocomplete="family-name">
    </div>
  </div>

  <div class="form-field">
    <label for="email">{{ i18n "form_email" }}</label>
    <input id="email" name="email" type="email" autocomplete="email" inputmode="email" spellcheck="false" required>
  </div>

  <div class="form-grid form-grid--2">
    <div class="form-field">
      <label for="city">{{ i18n "form_city" }}</label>
      <select id="city" name="city" autocomplete="address-level2">
        {{ range .Params.form.cities }}
          <option value="{{ . }}">{{ . }}</option>
        {{ end }}
      </select>
    </div>

    <div class="form-field">
      <label for="interest">{{ i18n "form_interest" }}</label>
      <select id="interest" name="interest" autocomplete="off" required>
        {{ range .Params.form.interests }}
          <option value="{{ . }}">{{ . }}</option>
        {{ end }}
      </select>
    </div>
  </div>

  <div class="form-field">
    <label for="message">{{ i18n "form_message" }}</label>
    <textarea id="message" name="message" rows="6" autocomplete="off"></textarea>
  </div>

  <input type="hidden" name="language" value="{{ $lang }}">

  <div class="form-honeypot" aria-hidden="true">
    <label for="company">Company</label>
    <input id="company" name="company" type="text" tabindex="-1" autocomplete="off">
  </div>

  <button class="button button--primary" type="submit">{{ i18n "form_submit" }}</button>
  <p id="form-status" class="form-status" aria-live="polite"></p>
  <p class="form-fallback">
    {{ i18n "form_fallback_prefix" }}
    <a href="mailto:{{ $langSite.Params.contact.primary_email }}">{{ $langSite.Params.contact.primary_email }}</a>
  </p>
</form>
