<div class="cause-grid" data-reveal>
  {{ range . }}
    {{ $external := .Params.external_url }}
    <article class="cause-card">
      <a class="cause-card__link" href="{{ with $external }}{{ . }}{{ else }}{{ .RelPermalink }}{{ end }}"{{ if $external }} target="_blank" rel="noreferrer"{{ end }}>
        <div class="stack-md">
          <div class="stack-sm">
            <h3>{{ .Title }}</h3>
            <p class="text-muted">{{ .Params.card_excerpt | default .Params.description }}</p>
          </div>
          <span class="cause-card__cta">{{ i18n "learn_more" }} <span class="cta-arrow{{ if $external }} cta-arrow--up{{ end }}" aria-hidden="true">{{ if $external }}↗{{ else }}→{{ end }}</span>{{ if $external }}<span class="sr-only">{{ i18n "opens_in_new_tab" }}</span>{{ end }}</span>
        </div>
      </a>
    </article>
  {{ end }}
</div>
