<div class="cause-grid" data-reveal>
  {{ range . }}
    <article class="cause-card">
      <a class="cause-card__link" href="{{ .RelPermalink }}">
        <div class="stack-md">
          <div class="stack-sm">
            <h3>{{ .Title }}</h3>
            <p class="text-muted">{{ .Params.card_excerpt | default .Params.description }}</p>
          </div>
          <span class="cause-card__cta">{{ i18n "learn_more" }}</span>
        </div>
      </a>
    </article>
  {{ end }}
</div>
