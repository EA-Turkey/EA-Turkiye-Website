<div class="cause-grid" data-reveal>
  {{ range . }}
    {{ $accentKey := replace (.Params.accent | default "general") "-" "_" }}
    <article class="cause-card">
      <a class="cause-card__link" href="{{ with .Params.external_url }}{{ . }}{{ else }}{{ .RelPermalink }}{{ end }}"{{ with .Params.external_url }} target="_blank" rel="noreferrer"{{ end }}>
        {{ if .Params.accent }}<span class="cause-card__eyebrow">{{ i18n (printf "cause_%s" $accentKey) }}</span>{{ end }}
        <div class="stack-md">
          <div class="stack-sm">
            <h3>{{ .Title }}</h3>
            <p class="text-muted">{{ .Params.card_excerpt | default .Params.description }}</p>
          </div>
          <span class="cause-card__cta">{{ i18n "learn_more" }}</span>
        </div>
      </a>
    </article>
  {{ end }}
</div>
