{{ $items := cond (reflect.IsSlice .) . .items }}
{{ $label := cond (reflect.IsSlice .) "" .label }}
{{ with $items }}
  <div class="stats-strip" data-reveal>
    {{ with $label }}<p class="section-header__eyebrow" style="text-align:center; margin-bottom: var(--space-16);">{{ . }}</p>{{ end }}
    <div class="stats-strip__grid">
      {{ range . }}
        <div class="stats-strip__item">
          <div class="stats-strip__value">{{ .value }}</div>
          <p class="stats-strip__label">{{ .label }}</p>
        </div>
      {{ end }}
    </div>
  </div>
{{ end }}
