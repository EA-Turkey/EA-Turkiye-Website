{{ partial "hero.html" (dict
  "page" .
  "variant" "page"
  "eyebrow" .Params.hero_eyebrow
  "title" (.Params.hero_title | default .Title)
) }}

<section class="section">
  <div class="container">
    <div class="cause-grid cause-grid--cta" style="margin-top: 0;" data-reveal>
      {{ range .Params.resources }}
        <article class="cause-card">
          <a class="cause-card__link" href="{{ .url }}" target="_blank" rel="noreferrer">
            <div class="stack-md">
              <div class="stack-sm">
                <h3>{{ .title }}</h3>
                <p class="text-muted" style="color: rgba(255,255,255,0.8);">{{ .text }}</p>
              </div>
              <span class="cause-card__cta" style="color: rgba(255,255,255,0.9);">Keşfet →</span>
            </div>
          </a>
        </article>
      {{ end }}
    </div>
  </div>
</section>
