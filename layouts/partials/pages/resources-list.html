{{ partial "hero.html" (dict
  "page" .
  "variant" "page"
  "eyebrow" .Params.hero_eyebrow
  "title" (.Params.hero_title | default .Title)
) }}

<section class="section">
  <div class="container">
    <div class="resource-list" data-reveal>
      {{ range .Params.resources }}
        <a class="resource-row" href="{{ .url }}" target="_blank" rel="noreferrer">
          <div class="resource-row__main">
            <h3 class="resource-row__title">{{ .title }}</h3>
            <p class="resource-row__text text-muted">{{ .text }}</p>
          </div>
          <span class="resource-row__arrow" aria-hidden="true">→</span>
        </a>
      {{ end }}
    </div>
  </div>
</section>
